<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }
        .status {
            padding: 20px 40px;
            border-radius: 10px;
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        .approved {
            background-color: #4CAF50; /* Green */
        }
        .not-approved {
            background-color: #f44336; /* Red */
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Loan Status Checker</h1>

    <div id="loanStatus" class="status approved">
        {% if result == "Approved" %}
            Loan Approved
        {% else %}
            Loan Not Approved
        {% endif %}
    </div>

    <div id="loanStatusNot" class="status not-approved" style="display:none;">
        Loan Not Approved
    </div>

    <br>
    <button onclick="showApproved()">Show Approved</button>
    <button onclick="showNotApproved()">Show Not Approved</button>

    <script>
        function showApproved() {
            document.getElementById("loanStatus").style.display = "inline-block";
            document.getElementById("loanStatusNot").style.display = "none";
        }

        function showNotApproved() {
            document.getElementById("loanStatus").style.display = "none";
            document.getElementById("loanStatusNot").style.display = "inline-block";
        }
    </script>
</body>
</html>
